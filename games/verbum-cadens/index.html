

<!DOCTYPE html>
<html lang="la">
<head>
<meta charset="UTF-8">
<title>Verbum Cadens</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../../css/style.css">

</head>

<body>
<a href="../../index.html" class="tasto-ludi">LUDI</a>
<img class="character left" src="../../assets/img/paphnutia.png" alt="Paphnutia">
<img class="character right" src="../../assets/img/paphnutius.png" alt="Paphnutius">

<h1>Verbum Cadens</h1>

<div class="hud">
    <div>Puncta: <span id="score">0</span></div>
    <div>Vitae: <span id="lives">3</span></div>
    <div>Gradus: <span id="level">1</span></div>
</div>
<div class="player-panel">
    <label for="player-name">Nomen ludentis:</label>
    <input id="player-name" type="text" maxlength="20" placeholder="Scrivi il nome">
</div>

<div id="game-area">
    <div id="falling-word">—</div>
</div>

<div class="persons">
    <button data-person="ego">ego</button>
    <button data-person="tu">tu</button>
    <button data-person="ille">ille / illa</button>
    <button data-person="nos">nos</button>
    <button data-person="vos">vos</button>
    <button data-person="illi">illi / illae</button>
</div>

<div class="controls">
    <button onclick="startGame()">Incipe</button>
    <button onclick="resetGame()">Lude iterum</button>
</div>

<div class="leaderboard">
    <h2>Tabula Optima</h2>
    <ol id="leaderboard-list"></ol>
    <button class="clear-board" onclick="clearLeaderboard()">Dele tabulam</button>
</div>

<div class="results-panel" id="results-panel">
    <h2>Responsa</h2>
    <ul id="results-list"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
